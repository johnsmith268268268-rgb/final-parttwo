<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coordinates</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: black;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      width: 600px;
      background: #111;
      padding: 32px;
      border-radius: 18px;
      box-shadow: 0 0 25px rgba(0,0,0,0.7);
    }

    h1 {
      font-size: 38px;
      margin-bottom: 20px;
      text-transform: lowercase;
    }

    input {
      width: 100%;
      padding: 18px;
      border-radius: 12px;
      border: 1px solid #222;
      background: #050505;
      color: white;
      font-size: 18px;
      outline: none;
    }

    input:focus {
      border-color: #444;
    }

    #result {
      margin-top: 30px;
      font-size: 20px;
      line-height: 1.6;
    }

    #result a {
      color: #60a5fa;
      text-decoration: none;
      word-break: break-all;
    }

    #result a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>enter coordinates</h1>

    <input
      type="text"
      id="coordinates"
      placeholder="Enter coordinates"
      autocomplete="off"
    />

    <div id="result"></div>
  </div>

  <script>
    const input = document.getElementById("coordinates");
    const result = document.getElementById("result");

    function checkCoordinates() {
      const userInput = input.value.trim();

      if (
        userInput.includes("40.") &&
        userInput.includes("58.")
      ) {

        result.innerHTML = `
          Access granted.<br><br>

          <a href="https://docs.google.com/document/d/1S1t4hVbADYgXoiYl_07qXMsFMwbfpPcdsv77CIuHS7U/copy?tab=t.0" target="_blank">
            https://docs.google.com/document/d/1S1t4hVbADYgXoiYl_07qXMsFMwbfpPcdsv77CIuHS7U/copy?tab=t.0
          </a>
        `;

      } else {

        result.innerHTML = "Incorrect coordinates.";

      }
    }

    input.addEventListener("keydown", function(event) {

      if (event.key === "Enter") {
        checkCoordinates();
      }

    });
  </script>

</body>
</html>

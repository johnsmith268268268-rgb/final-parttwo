<script>
  const input = document.getElementById("coordinates");
  const result = document.getElementById("result");

  const secretCoordinates1 = "40.";
  const secretCoordinates2 = "58.";

  function checkCoordinates() {
    const userInput = input.value.trim();

    if (
      userInput.includes(secretCoordinates1) &&
      userInput.includes(secretCoordinates2)
    ) {

      result.innerHTML = `
        Access granted.<br><br>

        <a href="https://docs.google.com/document/d/1S1t4hVbADYgXoiYl_07qXMsFMwbfpPcdsv77CIuHS7U/copy?tab=t.0" target="_blank">
          https://docs.google.com/document/d/1S1t4hVbADYgXoiYl_07qXMsFMwbfpPcdsv77CIuHS7U/copy?tab=t.0
        </a>
      `;

    } else {

      result.innerHTML = "Incorrect coordinates.";

    }
  }

  input.addEventListener("keydown", function(event) {

    if (event.key === "Enter") {
      checkCoordinates();
    }

  });
</script>
